<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FideliZa - Painel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="wrapper">
    <nav id="sidebar">
        <div class="sidebar-heading mb-4 px-4">
            <i class="fas fa-sparkles text-warning"></i> FideliZa
        </div>
        
        <div class="sidebar-section-title">Principal</div>
        <a href="/dashboard" class="nav-link-sidebar active"><i class="fas fa-home"></i> Início</a>
        <a href="/cadastro" class="nav-link-sidebar"><i class="fas fa-users"></i> Clientes</a>
        
        <div class="sidebar-section-title">Programa</div>
        <a href="/pontuar" class="nav-link-sidebar"><i class="fas fa-coins"></i> Fidelização</a>
        <a href="/resgate" class="nav-link-sidebar"><i class="fas fa-gift"></i> Recompensas</a>
        <a href="/relatorios" class="nav-link-sidebar"><i class="fas fa-chart-bar"></i> Relatórios</a>
    </nav>

    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold m-0">Dashboard</h4>
                <small class="text-muted">Início</small>
            </div>
            <div>
                <button class="btn btn-light btn-sm rounded-circle shadow-sm p-2 me-2"><i class="fas fa-bell"></i></button>
                <button class="btn btn-light btn-sm rounded-circle shadow-sm p-2"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
