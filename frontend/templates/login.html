<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FideliZa - Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../static/css/style.css">

  <style>
    body {
      background-color: var(--bg-sistema);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      border: 2px solid var(--rosa-pastel);
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 10px 25px rgba(92, 58, 67, 0.05);
      padding: 30px;
      max-width: 400px;
      width: 100%;
    }

    .alert-error {
      background: #ffe5e5;
      color: #9b1c1c;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }

    .alert-success {
      background: #e7f8ed;
      color: #166534;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }

    .link-cadastro {
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand-logo">
        <i class="bi bi-stars"></i>
      </div>
      <h1 class="brand-name">Fideli<span>Za</span></h1>
      <p class="brand-tagline">Sistema de fidelização de clientes</p>
    </div>

    <div id="alertaErro" class="alert-error mb-3 d-none">
      <i class="bi bi-exclamation-circle me-1"></i>
      E-mail ou senha incorretos. Tente novamente.
    </div>

    <div id="alertaSucesso" class="alert-success mb-3 d-none">
      <i class="bi bi-check-circle me-1"></i>
      Cadastro realizado com sucesso. Faça login.
    </div>

    <!-- FORMULÁRIO DE LOGIN -->
    <form id="formLogin" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label">E-mail</label>
        <input
          type="email"
          name="email"
          class="form-control"
          id="email"
          placeholder="seu@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="mb-4">
        <label for="senha" class="form-label">Senha</label>
        <div class="input-group">
          <input
            type="password"
            name="senha"
            class="form-control"
            id="senha"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
          <span class="input-group-text" id="toggleSenha" title="Mostrar/ocultar senha" style="cursor: pointer;">
            <i class="bi bi-eye" id="iconeSenha"></i>
          </span>
        </div>
      </div>

      <button type="submit" class="btn btn-login btn-primary w-100 text-white mb-3">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>

      <p class="text-center mb-0">
        Não tem conta?
        <a class="link-cadastro" id="abrirCadastro">Cadastre-se</a>
      </p>
    </form>

    <!-- FORMULÁRIO DE CADASTRO -->
    <form id="formCadastro" class="d-none" novalidate>
      <div class="mb-3">
        <label for="nomeCadastro" class="form-label">Nome</label>
        <input
          type="text"
          class="form-control"
          id="nomeCadastro"
          placeholder="Seu nome"
          required
        />
      </div>

      <div class="mb-3">
        <label for="emailCadastro" class="form-label">E-mail</label>
        <input
          type="email"
          class="form-control"
          id="emailCadastro"
          placeholder="seu@email.com"
          required
        />
      </div>

      <div class="mb-3">
        <label for="senhaCadastro" class="form-label">Senha</label>
        <input
          type="password"
          class="form-control"
          id="senhaCadastro"
          placeholder="Digite sua senha"
          required
        />
      </div>

      <div class="mb-4">
        <label for="confirmarSenha" class="form-label">Confirmar senha</label>
        <input
          type="password"
          class="form-control"
          id="confirmarSenha"
          placeholder="Confirme sua senha"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary w-100 text-white mb-3">
        <i class="bi bi-person-plus me-2"></i>Cadastrar
      </button>

      <p class="text-center mb-0">
        Já tem conta?
        <a class="link-cadastro" id="abrirLogin">Entrar</a>
      </p>
    </form>

    <div id="demoArea">
      <div class="divider mb-3 mt-3">acesso de demonstração</div>
      <div class="badge-demo text-center">
        E-mail: <code>admin@loja.com</code> &nbsp;|&nbsp; Senha: <code>1234</code>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const formLogin = document.getElementById('formLogin');
    const formCadastro = document.getElementById('formCadastro');

    const alertaErro = document.getElementById('alertaErro');
    const alertaSucesso = document.getElementById('alertaSucesso');

    const abrirCadastro = document.getElementById('abrirCadastro');
    const abrirLogin = document.getElementById('abrirLogin');
    const demoArea = document.getElementById('demoArea');

    abrirCadastro.addEventListener('click', function () {
      formLogin.classList.add('d-none');
      formCadastro.classList.remove('d-none');
      demoArea.classList.add('d-none');
      alertaErro.classList.add('d-none');
      alertaSucesso.classList.add('d-none');
    });

    abrirLogin.addEventListener('click', function () {
      formCadastro.classList.add('d-none');
      formLogin.classList.remove('d-none');
      demoArea.classList.remove('d-none');
      alertaErro.classList.add('d-none');
    });

    document.getElementById('toggleSenha').addEventListener('click', function () {
      const input = document.getElementById('senha');
      const icone = document.getElementById('iconeSenha');

      if (input.type === 'password') {
        input.type = 'text';
        icone.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icone.className = 'bi bi-eye';
      }
    });

    formCadastro.addEventListener('submit', function (event) {
      event.preventDefault();

      const nome = document.getElementById('nomeCadastro').value.trim();
      const email = document.getElementById('emailCadastro').value.trim();
      const senha = document.getElementById('senhaCadastro').value;
      const confirmarSenha = document.getElementById('confirmarSenha').value;

      alertaErro.classList.add('d-none');
      alertaSucesso.classList.add('d-none');

      if (!nome || !email || !senha || !confirmarSenha) {
        alertaErro.textContent = 'Preencha todos os campos.';
        alertaErro.classList.remove('d-none');
        return;
      }

      if (senha !== confirmarSenha) {
        alertaErro.textContent = 'As senhas não conferem.';
        alertaErro.classList.remove('d-none');
        return;
      }

      const usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];

      const usuarioExiste = usuarios.some(usuario => usuario.email === email);

      if (usuarioExiste) {
        alertaErro.textContent = 'Este e-mail já está cadastrado.';
        alertaErro.classList.remove('d-none');
        return;
      }

      usuarios.push({
        nome: nome,
        email: email,
        senha: senha
      });

      localStorage.setItem('usuarios', JSON.stringify(usuarios));

      formCadastro.reset();
      formCadastro.classList.add('d-none');
      formLogin.classList.remove('d-none');
      demoArea.classList.remove('d-none');

      alertaSucesso.classList.remove('d-none');
    });

    formLogin.addEventListener('submit', function (event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      alertaErro.classList.add('d-none');
      alertaSucesso.classList.add('d-none');

      if (email === 'admin@loja.com' && senha === '1234') {
        alert('Login realizado com sucesso!');
        return;
      }

      const usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];

      const usuarioEncontrado = usuarios.find(usuario =>
        usuario.email === email && usuario.senha === senha
      );

      if (usuarioEncontrado) {
        alert('Login realizado com sucesso!');
      } else {
        alertaErro.innerHTML = '<i class="bi bi-exclamation-circle me-1"></i> Login não encontrado. Cadastre-se primeiro.';
        alertaErro.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
