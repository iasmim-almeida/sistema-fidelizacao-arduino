<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FideliZa - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../static/css/style.css">
    <style>
        body {
            background-color: var(--bg-sistema);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: 2px solid var(--rosa-pastel);
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(92, 58, 67, 0.05);
            padding: 30px;
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>

<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand-logo">
        <i class="bi bi-stars"></i>
      </div>
      <h1 class="brand-name">Fideli<span>Za</span></h1>
      <p class="brand-tagline">Sistema de fidelização de clientes</p>
    </div>

    <div id="alertaErro" class="alert-error mb-3 d-none">
      <i class="bi bi-exclamation-circle me-1"></i>
      E-mail ou senha incorretos. Tente novamente.
    </div>

    <form id="formLogin" action="/login" method="POST" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label">E-mail</label>
        <input
          type="email"
          name="email"
          class="form-control"
          id="email"
          placeholder="seu@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="mb-4">
        <label for="senha" class="form-label">Senha</label>
        <div class="input-group">
          <input
            type="password"
            name="senha"
            class="form-control"
            id="senha"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
          <span class="input-group-text" id="toggleSenha" title="Mostrar/ocultar senha" style="cursor: pointer;">
            <i class="bi bi-eye" id="iconeSenha"></i>
          </span>
        </div>
      </div>

      <button type="submit" class="btn btn-login btn-primary w-100 text-white mb-3">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
    </form>

    <div class="divider mb-3">acesso de demonstração</div>
    <div class="badge-demo text-center">
      E-mail: <code>admin@loja.com</code> &nbsp;|&nbsp; Senha: <code>1234</code>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Toggle mostrar/ocultar senha
    document.getElementById('toggleSenha').addEventListener('click', function () {
      const input = document.getElementById('senha');
      const icone = document.getElementById('iconeSenha');
      if (input.type === 'password') {
        input.type = 'text';
        icone.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icone.className = 'bi bi-eye';
      }
    });

  </script>
</body>
</html>
